<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAVE | Premium Fast Food</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; /* We keep overflow hidden until loading is done */
            background-color: #f4f4f0; /* Warm off-white for the cafe site */
            font-family: 'Montserrat', sans-serif; 
            color: #111;
        }

        /* --- AGENCY PRELOADER (CANVAS ENGINE) --- */
        #preloader-container {
            position: fixed;
            inset: 0;
            background-color: #050505;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #1a0500 0%, #050505 80%);
        }

        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .loading-ui {
            position: absolute;
            bottom: 40px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .counter {
            color: #ff3b00;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 59, 0, 0.4);
        }

        .loading-text {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* --- MAIN CAFE WEBSITE (HERO SECTION) --- */
        .main-wrapper {
            opacity: 0; /* Hidden initially, GSAP will reveal it */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        nav {
            padding: 30px 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #111;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .nav-links a { color: #111; text-decoration: none; }
        
        .order-btn {
            background-color: #ff3b00;
            color: white !important;
            padding: 10px 20px;
            border-radius: 50px;
        }

        /* Hero Layout */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5vw;
            position: relative;
            overflow: hidden;
        }

        .hero-tagline {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff3b00;
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: 11vw;
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -4px;
            text-transform: uppercase;
            max-width: 800px;
        }

        /* Infinite Scrolling Marquee */
        .marquee-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            overflow: hidden;
            background-color: #111;
            color: #f4f4f0;
            padding: 15px 0;
            transform: rotate(-2deg) scale(1.05); /* Brutalist tilt */
            z-index: -1;
        }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .marquee-item {
            padding: 0 2vw;
            display: flex;
            align-items: center;
        }

        /* The little dot separator */
        .marquee-item::after {
            content: '•';
            color: #ff3b00;
            margin-left: 4vw;
        }
    </style>
</head>
<body>

    <div id="preloader-container">
        <canvas id="particle-canvas"></canvas>
        <div class="loading-ui" id="ui">
            <div class="counter" id="counter">0%</div>
            <div class="loading-text">Igniting the Grill</div>
        </div>
    </div>

    <div class="main-wrapper" id="site-content">
        
        <nav>
            <div class="logo">CRAVE.</div>
            <div class="nav-links">
                <a href="#">Menu</a>
                <a href="#">Locations</a>
                <a href="#" class="order-btn">Order Now</a>
            </div>
        </nav>

        <div class="hero">
            <div class="hero-tagline" id="tagline">No Compromise. Just Flavor.</div>
            <h1 class="hero-title" id="main-title">
                Smash.<br>
                Sizzle.<br>
                Serve.
            </h1>

            <div class="marquee-container" id="marquee">
                <div class="marquee-content" id="marquee-inner">
                    <span class="marquee-item">100% Wagyu Beef</span>
                    <span class="marquee-item">Hand-Cut Fries</span>
                    <span class="marquee-item">Artisan Buns</span>
                    <span class="marquee-item">Secret Sauce</span>
                    <span class="marquee-item">100% Wagyu Beef</span>
                    <span class="marquee-item">Hand-Cut Fries</span>
                    <span class="marquee-item">Artisan Buns</span>
                    <span class="marquee-item">Secret Sauce</span>
                </div>
            </div>
        </div>
    </div>
