<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Cafe | Agency Build</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background-color: #050505; font-family: 'Helvetica Neue', Arial, sans-serif; }

    /* The Main Website Content (Hidden underneath) */
    .website-content {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      /* The video from the preloader will seamlessly become the background for this */
    }

    .website-content h1 {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -2px;
      text-transform: uppercase;
      opacity: 0; /* Hidden initially */
    }

    /* --- AGENCY PRELOADER STYLES --- */
    .preloader-wrapper {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
    }

    /* 1. The Cinematic Background Video */
    .hero-video {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 2;
    }

    /* 2. The Text Mask Overlay (The Magic Trick) */
    /* Black background with white text. mix-blend-mode: multiply makes the white transparent, showing the video, while keeping the black solid. */
    .mask-overlay {
      position: absolute;
      inset: 0;
      background-color: #050505;
      color: #ffffff;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      mix-blend-mode: multiply;
      will-change: transform;
    }

    .mask-text {
      font-family: 'Anton', sans-serif;
      font-size: 22vw; /* Massive viewport-based typography */
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin-bottom: 5vh;
      transform-origin: center center;
    }

    /* 3. The Minimalist UI */
    .loading-ui {
      position: absolute;
      bottom: 40px;
      left: 40px;
      right: 40px;
      z-index: 4; /* Sits above the mask */
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .loading-header {
      display: flex;
      justify-content: space-between;
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background-color: rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background-color: #ffffff;
    }
  </style>
</head>
<body>

  <video class="hero-video" autoplay loop muted playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-grilling-meat-on-a-barbecue-3343/1080p.mp4" type="video/mp4">
  </video>

  <div class="preloader-wrapper" id="preloader">
    
    <div class="mask-overlay" id="mask">
      <div class="mask-text" id="mask-text">CRAVE</div>
    </div>

    <div class="loading-ui" id="ui">
      <div class="loading-header">
        <span>Curating Menu</span>
        <span id="counter">00%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="bar"></div>
      </div>
    </div>

  </div>

  <div class="website-content">
    <h1 id="hero-title">Experience Flavour</h1>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script>
    const tl = gsap.timeline({
      onComplete: () => {
        // Remove preloader UI entirely so it doesn't block clicks
        document.getElementById('preloader').style.display = 'none';
      }
    });

    let counterObj = { value: 0 };
    let counterElement = document.getElementById("counter");

    // 1. The Loading Tension (Simulated load time)
    tl.to(counterObj, {
      value: 100,
      duration: 3,
      ease: "power2.inOut",
      onUpdate: () => {
        // Pad with leading zero for premium aesthetic (e.g., 05%, 99%)
        let val = Math.round(counterObj.value);
        counterElement.innerText = (val < 10 ? "0" + val : val) + "%";
      }
    }, 0)
    
    // Bar grows in sync with the counter
    .to("#bar", {
      width: "100%",
      duration: 3,
      ease: "power2.inOut"
    }, 0)

    // 2. The Fade Out of the UI
    .to("#ui", {
      opacity: 0,
      duration: 0.4,
      y: 10,
      ease: "power2.in"
    }, "+=0.2") // Triggers right after hitting 100%

    // 3. THE 1.5 LAKH TRANSITION: The Text Expansion
    // The text scales up massively so the transparent window overtakes the screen
    .to("#mask-text", {
      scale: 60, // Scale it up so the hole in the letter 'R' or 'A' fills the screen
      opacity: 0, // Fades out the black completely at the end of the scale
      duration: 1.5,
      ease: "expo.inOut" // A sharp, cinematic camera-lens ease
    }, "+=0.1")

    // 4. Reveal the Website
    // The video is now the background of the actual website, we fade in the real hero text
    .to("#hero-title", {
      opacity: 1,
      y: -20,
      duration: 1,
      ease: "power3.out"
    }, "-=0.5");
  </script>
</body>
</html>
