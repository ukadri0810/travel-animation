<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fast Food | Custom Canvas Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #050505; font-family: 'Montserrat', sans-serif; }

        /* The Preloader Canvas Container */
        #preloader-container {
            position: fixed;
            inset: 0;
            background-color: #050505;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Subtle radial gradient for depth */
            background-image: radial-gradient(circle at center, #1a0500 0%, #050505 80%);
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Loading UI */
        .loading-ui {
            position: absolute;
            bottom: 40px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .counter {
            color: #ff3b00; /* Grill Fire Red */
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 59, 0, 0.4);
        }

        .loading-text {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Main Website Content (Hidden initially) */
        .website-content {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            color: #111;
        }

        .website-content h1 {
            font-size: 6vw;
            text-transform: uppercase;
            letter-spacing: -2px;
            opacity: 0;
            transform: translateY(20px);
        }
    </style>
</head>
<body>

    <!-- Agency Level Physics Preloader -->
    <div id="preloader-container">
        <canvas id="particle-canvas"></canvas>
        <div class="loading-ui" id="ui">
            <div class="counter" id="counter">0%</div>
            <div class="loading-text">Firing Up The Grill</div>
        </div>
    </div>

    <!-- Website Content -->
    <div class="website-content">
        <h1 id="hero-text">Order Ready.</h1>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        /**
         * SENIOR ENGINEERING: CUSTOM CANVAS PARTICLE PHYSICS ENGINE
         */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particleArray = [];
        let adjustX = 0;
        let adjustY = 0;
        let isExploding = false; // Triggered when loading hits 100%

        // Handle Mouse / Touch Interaction
        const mouse = {
            x: null,
            y: null,
            radius: 120 // How far the mouse pushes the particles
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Setup the Text we want to turn into particles
        ctx.fillStyle = 'white';
        // Responsive font sizing based on screen width
        let fontSize = canvas.width < 768 ? 60 : 130; 
        ctx.font = `900 ${fontSize}px Montserrat`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Draw the text in the center
        ctx.fillText('CRAVE', canvas.width / 2, canvas.height / 2);

        // Scan the canvas and create particles where the text is
        const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);

        class Particle {
            constructor(x, y) {
                // Current position
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Target position (where it forms the letter)
                this.baseX = x;
                this.baseY = y;
                // Physics weight
                this.density = (Math.random() * 30) + 1;
                this.size = Math.random() * 2.5 + 1;
                // Fast food fire colors (Reds, Oranges, Yellows)
                const colors = ['#ff3b00', '#ff9900', '#ffc107', '#ff6a00'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // For the final explosion
                this.explodeVelX = (Math.random() - 0.5) * 50;
                this.explodeVelY = (Math.random() - 0.5) * 50;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                if (isExploding) {
                    // Final transition: Blast outward
                    this.x += this.explodeVelX;
                    this.y += this.explodeVelY;
                    this.draw();
                    return;
                }

                // Interactive Physics: Mouse Repulsion
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // Spring Physics: Snap back to original position
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 10;
                    }
                }
                this.draw();
            }
        }

        function init() {
            particleArray = [];
            // Map the pixels to particles (skip every 4 pixels for performance and stylization)
            for (let y = 0, y2 = textCoordinates.height; y < y2; y += 4) {
                for (let x = 0, x2 = textCoordinates.width; x < x2; x += 4) {
                    // Check if the pixel has opacity (meaning it's part of the text)
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        let positionX = x;
                        let positionY = y;
                        particleArray.push(new Particle(positionX, positionY));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Handle Window Resize properly
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Re-render text on resize
            ctx.fillStyle = 'white';
            let newFontSize = canvas.width < 768 ? 60 : 130;
            ctx.font = `900 ${newFontSize}px Montserrat`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('CRAVE', canvas.width / 2, canvas.height / 2);
            init();
        });

        /**
         * THE LOADING SEQUENCE & EXIT ANIMATION
         */
        const tl = gsap.timeline({
            onComplete: () => {
                document.getElementById('preloader-container').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });

        let loadState = { value: 0 };
        let counterEl = document.getElementById("counter");

        tl.to(loadState, {
            value: 100,
            duration: 4, // 4 seconds of simulated loading
            ease: "power1.inOut",
            onUpdate: () => {
                counterEl.innerText = Math.round(loadState.value) + "%";
            }
        })
        
        // When hitting 100%, trigger the physics explosion
        .add(() => {
            isExploding = true;
        })

        // Fade out the UI elements instantly
        .to("#ui", { opacity: 0, duration: 0.2 }, "<")

        // Fade out the black background to reveal the site underneath
        .to("#preloader-container", {
            backgroundColor: "transparent",
            backgroundImage: "none",
            duration: 1.5,
            ease: "power2.inOut"
        }, "+=0.2")

        // The final text smoothly fades and scales in
        .to("#hero-text", {
            opacity: 1,
            y: 0,
            duration: 1.2,
            ease: "power3.out"
        }, "-=1");

    </script>
</body>
</html>
