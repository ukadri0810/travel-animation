<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kashmir 2025 | Cinematic Experience</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #050505; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }

    /* Preloader Container */
    .preloader {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* The Loading Counter */
    .counter {
      position: absolute;
      bottom: 40px;
      right: 50px;
      font-size: 4vw;
      font-weight: 300;
      letter-spacing: -2px;
      z-index: 10;
      mix-blend-mode: difference;
    }

    /* The Cinematic Window (Mask) */
    .image-mask {
      width: 2px; /* Starts as a razor-thin sliver */
      height: 0vh; /* Will grow to indicate progress */
      overflow: hidden;
      position: relative;
      will-change: width, height;
    }

    /* The Real Photography */
    .hero-image {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.5); /* Starts scaled up for depth */
      filter: brightness(0.6) contrast(1.1); /* Cinematic color grading */
      will-change: transform;
    }

    /* Hero Text Reveal */
    .hero-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8vw;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #ffffff;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      font-family: 'Georgia', serif;
    }

    .hero-subtitle {
      font-size: 1.2vw;
      letter-spacing: 0.3em;
      display: block;
      margin-top: 20px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
  </style>
</head>
<body>

  <div class="preloader">
    <div class="counter" id="counter">0%</div>
    
    <div class="image-mask">
      <!-- High-res placeholder of Dal Lake/Shikara -->
      <img src="https://images.unsplash.com/photo-1595815771614-ade9d652a65d?ixlib=rb-4.0.3&auto=format&fit=crop&w=2500&q=80" alt="Kashmir Dal Lake" class="hero-image">
    </div>

    <h1 class="hero-title">
      KASHMIR
      <span class="hero-subtitle">Bespoke Journeys 2025</span>
    </h1>
  </div>

  <!-- GSAP Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script>
    const tl = gsap.timeline({
      onComplete: () => {
        // Unlock scroll when animation finishes
        document.body.style.overflow = "auto";
      }
    });

    // 1. Simulate the loading progress (Tension)
    let counterElement = document.getElementById("counter");
    let loadProgress = { value: 0 };

    tl.to(loadProgress, {
      value: 100,
      duration: 2.5,
      ease: "power2.inOut",
      onUpdate: () => {
        counterElement.innerText = Math.round(loadProgress.value) + "%";
      }
    }, 0);

    // 2. The sliver grows vertically as it "loads"
    tl.to(".image-mask", {
      height: "60vh",
      duration: 2.5,
      ease: "power2.inOut"
    }, 0);

    // 3. The image slowly scales down inside the sliver for a parallax feel
    tl.to(".hero-image", {
      scale: 1.2,
      duration: 2.5,
      ease: "power2.inOut"
    }, 0);

    // 4. The Grand Expansion (The Drop)
    tl.to(".counter", { opacity: 0, duration: 0.3 }, "-=0.2") // Fade out counter
      .to(".image-mask", {
        width: "100vw",
        height: "100vh",
        duration: 1.2,
        ease: "expo.inOut" // A sharp, cinematic snap curve
      }, "+=0.1")
      .to(".hero-image", {
        scale: 1, // Settles into perfectly framed real scale
        filter: "brightness(0.9) contrast(1.1)", // Brightens up slightly
        duration: 1.2,
        ease: "expo.inOut"
      }, "<") // "<" means it runs at the exact same time as the mask expansion

    // 5. Hero Typography smoothly fades in over the real image
      .to(".hero-title", {
        opacity: 1,
        y: -20, // Slight float up
        duration: 1.5,
        ease: "power3.out"
      }, "-=0.5");
  </script>
</body>
</html>
