<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Travel Loader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="loader-screen" id="loaderScreen">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <section class="loader-card" aria-label="Travel website loading animation">
      <p class="eyebrow">Curated Travel Experiences</p>

      <div class="scene">
        <div class="shadow"></div>

        <div class="suitcase-wrap">
          <div class="suitcase-lid">
            <div class="lid-inner"></div>
          </div>

          <div class="suitcase-body">
            <div class="handle"></div>
            <div class="corner corner-left"></div>
            <div class="corner corner-right"></div>
            <div class="strap strap-left"></div>
            <div class="strap strap-right"></div>
            <div class="lock"></div>
          </div>

          <div class="item passport">
            <span class="passport-line"></span>
            <span class="passport-seal"></span>
          </div>

          <div class="item ticket">
            <span></span>
            <span></span>
          </div>

          <div class="item camera">
            <span class="lens"></span>
            <span class="flash"></span>
          </div>

          <div class="item glasses">
            <span></span>
            <span></span>
          </div>

          <div class="item shirt">
            <span class="shirt-neck"></span>
          </div>

          <div class="tag">
            <span class="tag-dot"></span>
            <strong>DT</strong>
          </div>
        </div>
      </div>

      <h1>Preparing your journey</h1>
      <p class="status" id="statusText">Selecting destinations with care</p>

      <div class="progress">
        <span></span>
      </div>
    </section>
  </main>

  <section class="preview-home" id="previewHome">
    <div>
      <p>Welcome</p>
      <h2>Your next escape begins here</h2>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
