<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Technical Portfolio</title>
  <style>
    /* Monospace for the technical readout, Clean Sans for branding */
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #030303; /* Near-absolute black for contrast */
      color: #ffffff;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* =========================================
       1. THE LOADER INTERFACE
       ========================================= */
    #meter-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      background-color: #030303;
      /* The final exit transition */
      transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* THE STROBE LINE:
       This is a full-height white block scaled down to 0.1% height.
       This makes the final "flash" buttery smooth because we only animate transform.
    */
    .strobe-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #ffffff;
      transform-origin: center;
      transform: scaleY(0.001); 
      z-index: 1;
      /* Slow breathing effect initially, explosive pop at the end */
      transition: transform 0.6s cubic-bezier(0.86, 0, 0.07, 1);
    }

    /* The Flash state triggered by JS */
    .strobe-line.fire-flash {
      transform: scaleY(1); /* Expands to fill the screen */
    }

    /* Typography Container */
    .ui-layer {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      justify-content: center;
      width: 100%;
      pointer-events: none;
    }

    /* The F-Stop Readout */
    .f-stop-container {
      position: absolute;
      /* Positioned precisely above the strobe line */
      top: calc(50% - 60px); 
      display: flex;
      align-items: baseline;
      gap: 10px;
      mix-blend-mode: difference; /* Ensures text stays visible if it overlaps white */
    }

    .f-stop-value {
      font-family: 'Space Mono', monospace;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.05em;
    }

    .f-stop-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* Metadata below the line */
    .studio-branding {
      position: absolute;
      top: calc(50% + 30px);
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      mix-blend-mode: difference;
    }

    /* When the flash fires, hide the UI text */
    .ui-layer.hide-ui {
      opacity: 0;
      transition: opacity 0.1s; /* Instant hide during the flash */
    }

    /* =========================================
       2. MAIN PORTFOLIO CONTENT
       ========================================= */
    #main-content {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      background-color: #f4f4f4; /* A light portfolio background to match the flash */
      color: #111;
      transform: scale(0.98);
      transition: opacity 1.5s ease 0.2s, transform 1.5s ease 0.2s;
    }

    .content-enter {
      opacity: 1 !important;
      transform: scale(1) !important;
    }
  </style>
</head>
<body>

  <div id="meter-loader">
    <div class="strobe-line" id="strobe"></div>
    
    <div class="ui-layer" id="ui-layer">
      <div class="f-stop-container">
        <span class="f-stop-label">Aperture</span>
        <span class="f-stop-value" id="f-stop-display">f/22</span>
      </div>
      <div class="studio-branding">Exposure Locked</div>
    </div>
  </div>

  <main id="main-content">
    <h1 style="font-weight: 300; letter-spacing: 0.1em;">Studio Architecture</h1>
    <p style="color: #666; margin-top: 10px; font-size: 0.85rem; letter-spacing: 0.1em;">SCROLL TO EXPLORE</p>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      
      const fStopDisplay = document.getElementById('f-stop-display');
      const strobe = document.getElementById('strobe');
      const uiLayer = document.getElementById('ui-layer');
      const loader = document.getElementById('meter-loader');
      const content = document.getElementById('main-content');

      // The sequence of F-stops opening up the lens
      const apertures = ['f/22', 'f/16', 'f/11', 'f/8', 'f/5.6', 'f/4.0', 'f/2.8', 'f/2.0', 'f/1.4', 'f/1.2'];
      let currentStep = 0;

      // 1. Start the rapid ticking sequence
      setTimeout(() => {
        
        const tickInterval = setInterval(() => {
          currentStep++;
          
          if (currentStep < apertures.length) {
            // Update the text to the next F-Stop
            fStopDisplay.innerText = apertures[currentStep];
          } else {
            // We reached f/1.2 (Wide Open / Maximum Light)
            clearInterval(tickInterval);
            
            // 2. Lock the exposure for a split second, then FIRE THE FLASH
            setTimeout(() => {
              
              // Trigger the violent white screen expansion
              strobe.classList.add('fire-flash');
              // Instantly hide the technical text
              uiLayer.classList.add('hide-ui');

              // 3. Fade out the loader completely to reveal the main site
              setTimeout(() => {
                loader.style.opacity = '0';
                content.classList.add('content-enter');

                // Garbage collection
                setTimeout(() => {
                  loader.remove();
                }, 1200);

              }, 400); // Trigger fade slightly before the flash finishes expanding

            }, 500); // The "Lock" pause duration
          }
        }, 100); // Tick speed (100ms creates a mechanical, rapid feel)

      }, 400); // Initial delay before sequence starts

    });
  </script>

</body>
</html>
