<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kashmir 2025 | Premium Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #f4f4f4; }

    /* Preloader CSS */
    .preloader-wrapper {
      position: fixed;
      inset: 0;
      background-color: #080c0f; /* Deep, moody slate */
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      width: 100%;
      max-width: 400px;
    }

    /* The SVG Scene Canvas */
    .kashmir-scene {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    /* Scene Elements Initial State */
    .sun {
      fill: #E48900; /* Warm Kashmiri Saffron */
      opacity: 0;
      transform: translateY(20px);
    }
    
    .mountain-line {
      fill: none;
      stroke: #ffffff;
      stroke-width: 1.5px;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
    }

    .water-line {
      stroke: #4a5a68;
      stroke-width: 1px;
      stroke-dasharray: 2 6;
      opacity: 0;
    }

    .shikara {
      opacity: 0;
      transform-origin: center bottom;
    }

    /* Typography */
    .preloader-text {
      color: #ffffff;
      font-family: 'Georgia', serif;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      display: flex;
      overflow: hidden;
    }

    .preloader-text .char {
      opacity: 0;
      transform: translateY(20px);
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="preloader-wrapper">
    <div class="preloader-content">
      
      <!-- Premium Custom Kashmir SVG Scene -->
      <svg viewBox="0 0 200 100" class="kashmir-scene">
        <!-- Sun -->
        <circle class="sun" cx="100" cy="55" r="10" />
        
        <!-- Mountains -->
        <path class="mountain-line" d="M10,80 L35,45 L60,65 L95,30 L135,70 L165,45 L190,80" />
        
        <!-- Water -->
        <line class="water-line" x1="10" y1="80" x2="190" y2="80" />

        <!-- Shikara (Boat) -->
        <g class="shikara">
          <path d="M75,80 C85,86 115,86 125,80 L118,76 C108,80 92,80 82,76 Z" fill="#C8A97E" />
          <path d="M88,76 L88,65 C93,62 107,62 112,65 L112,76" fill="none" stroke="#C8A97E" stroke-width="1.5" />
        </g>
      </svg>
      
      <!-- Text Reveal -->
      <div class="preloader-text">
        <span class="char">K</span><span class="char">a</span><span class="char">s</span><span class="char">h</span><span class="char">m</span><span class="char">i</span><span class="char">r</span>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script>
    document.body.style.overflow = "hidden";

    const tl = gsap.timeline({
      onComplete: () => {
        document.body.style.overflow = "auto";
        document.querySelector('.preloader-wrapper').style.pointerEvents = 'none';
      }
    });

    // 1. Draw the Mountains
    tl.to(".mountain-line", { strokeDashoffset: 0, duration: 2, ease: "power2.inOut" })
    
    // 2. Rise the Saffron Sun and show water
      .to(".sun", { opacity: 1, y: 0, duration: 1.5, ease: "power1.out" }, "-=1.2")
      .to(".water-line", { opacity: 1, duration: 1 }, "-=1")
      
    // 3. Reveal the Shikara and start a continuous gentle bobbing effect
      .to(".shikara", { opacity: 1, duration: 1, ease: "power2.out" }, "-=0.8")
      .to(".shikara", { 
        y: 2, 
        rotation: 1,
        duration: 1.5, 
        repeat: -1, 
        yoyo: true, 
        ease: "sine.inOut" 
      }, "-=0.5")

    // 4. Stagger the Typography from the bottom up
      .to(".preloader-text .char", { opacity: 1, y: 0, stagger: 0.08, duration: 1, ease: "power3.out" }, "-=1.5")
      .to(".preloader-text", { letterSpacing: "0.15em", duration: 2, ease: "power2.out" }, "-=1")

    // 5. The Grand Unveiling (Slides up elegantly)
      .to(".preloader-content", { y: -30, opacity: 0, duration: 0.6, ease: "power2.in", delay: 1 })
      .to(".preloader-wrapper", { yPercent: -100, duration: 1.2, ease: "expo.inOut", borderRadius: "0 0 50% 50%" }, "-=0.2");
  </script>
</body>
</html>
