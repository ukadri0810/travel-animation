<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kashmir 2025 | Premium Experience</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    /* Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #ffffff; overflow: hidden; font-family: 'Inter', sans-serif; }

    /* The Main Website Content (Hidden underneath the loader) */
    .website-content {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f8f9fa;
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: #1a1a1a;
    }

    /* --- PRELOADER STYLES --- */
    .preloader-wrapper {
      position: fixed;
      inset: 0;
      background-color: #0b1219; /* Deep, premium slate blue */
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      will-change: transform, border-radius;
    }

    /* The 3D Canvas Container */
    .spline-container {
      width: 100vw;
      height: 60vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Optional: Add a subtle fade-in to the 3D canvas itself */
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Loading UI Bar */
    .loading-ui {
      position: absolute;
      bottom: 10%;
      width: 80%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 10px;
    }

    .loading-text {
      color: #a3b1c6;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .counter {
      color: #ffffff;
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 400;
      line-height: 1;
    }
  </style>
</head>
<body>

  <div class="preloader-wrapper">
    
    <div class="spline-container">
      <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.94/build/spline-viewer.js"></script>
      
      <spline-viewer url="https://prod.spline.design/6Wq1Q7YGyUk-4Z0A/scene.splinecode"></spline-viewer>
    </div>

    <div class="loading-ui">
      <span class="loading-text">Loading your bespoke Kashmiri experience...</span>
      <span class="counter" id="counter">0%</span>
    </div>

  </div>

  <div class="website-content">
    <h1>Welcome to Kashmir</h1>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script>
    // Create the master timeline
    const tl = gsap.timeline({
      onComplete: () => {
        // Unlock website scrolling once preloader is gone
        document.body.style.overflow = "auto";
        // Remove preloader from DOM to free up memory
        document.querySelector('.preloader-wrapper').style.display = 'none';
      }
    });

    // 1. The Percentage Counter Logic
    let counterElement = document.getElementById("counter");
    let loadProgress = { value: 0 };

    // We animate the 'value' from 0 to 100 over 4 seconds
    tl.to(loadProgress, {
      value: 100,
      duration: 4, 
      ease: "power2.inOut",
      onUpdate: () => {
        // Update the HTML text every frame
        counterElement.innerText = Math.round(loadProgress.value) + "%";
      }
    });

    // 2. The Premium Exit Animation
    // Fade out the UI text first
    tl.to(".loading-ui", {
      opacity: 0,
      y: 20,
      duration: 0.6,
      ease: "power2.in"
    }, "+=0.2") // Wait 0.2s after hitting 100%

    // Smoothly slide the whole preloader up with the premium "peel" curve
    .to(".preloader-wrapper", {
      yPercent: -100,
      duration: 1.2,
      ease: "expo.inOut",
      borderRadius: "0 0 40% 40%" // Adds a fluid, tactile pull effect
    }, "-=0.2");
  </script>
</body>
</html>
