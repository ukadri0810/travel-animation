<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serene Shikara Loader</title>

  <style>
    :root {
      --midnight: #0B132B;
      --white: #FAFAFA;
      --gold: #D4AF37;
      --muted: rgba(250, 250, 250, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 35%, rgba(212, 175, 55, 0.08), transparent 34%),
        linear-gradient(180deg, #0B132B 0%, #050A18 100%);
      font-family: Inter, Montserrat, system-ui, sans-serif;
      overflow: hidden;
      color: var(--white);
    }

    .loader {
      width: min(90vw, 420px);
      text-align: center;
      display: grid;
      place-items: center;
      gap: 28px;
    }

    .shikara-wrap {
      width: 100%;
      max-width: 340px;
    }

    .boat-group {
      animation: boatBob 3.2s ease-in-out infinite;
      transform-origin: center;
    }

    .boat-line {
      fill: none;
      stroke: var(--white);
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .gold-line {
      fill: none;
      stroke: var(--gold);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.9;
    }

    .reflection-outline {
      fill: none;
      stroke: rgba(250, 250, 250, 0.24);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .reflection-fill {
      fill: none;
      stroke: var(--gold);
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-dasharray: 520;
      stroke-dashoffset: 520;
      animation: reflectionFill 3s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.45));
    }

    .loader-text {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      animation: textPulse 2.4s ease-in-out infinite;
    }

    .sub-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.8;
    }

    @keyframes boatBob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes reflectionFill {
      0% {
        stroke-dashoffset: 520;
        opacity: 0.25;
      }
      55% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      100% {
        stroke-dashoffset: 0;
        opacity: 0.45;
      }
    }

    @keyframes textPulse {
      0%, 100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .loader {
        gap: 22px;
      }

      .shikara-wrap {
        max-width: 300px;
      }

      .loader-text {
        letter-spacing: 0.13em;
      }
    }
  </style>
</head>

<body>
  <main class="loader">
    <svg
      class="shikara-wrap"
      viewBox="0 0 420 260"
      role="img"
      aria-label="Luxury Kashmir Shikara loading animation"
    >
      <g class="boat-group">
        <!-- Canopy -->
        <path
          class="boat-line"
          d="M146 96 C160 62, 260 62, 274 96"
        />
        <path
          class="boat-line"
          d="M160 96 L160 143"
        />
        <path
          class="boat-line"
          d="M260 96 L260 143"
        />
        <path
          class="boat-line"
          d="M147 99 L274 99"
        />

        <!-- Canopy detail -->
        <path
          class="gold-line"
          d="M177 86 C190 75, 230 75, 243 86"
        />

        <!-- Seat / cabin -->
        <path
          class="boat-line"
          d="M132 143 C158 130, 262 130, 288 143"
        />
        <path
          class="boat-line"
          d="M145 143 L275 143"
        />

        <!-- Boat body -->
        <path
          class="boat-line"
          d="M78 151 C118 187, 296 187, 342 151"
        />
        <path
          class="boat-line"
          d="M78 151 C135 164, 285 164, 342 151"
        />

        <!-- Bow and stern curves -->
        <path
          class="boat-line"
          d="M78 151 C63 146, 56 136, 52 124"
        />
        <path
          class="boat-line"
          d="M342 151 C359 145, 368 134, 371 121"
        />

        <!-- Paddle -->
        <path
          class="gold-line"
          d="M294 123 L356 84"
        />
        <path
          class="gold-line"
          d="M356 84 C366 79, 374 82, 378 89 C370 92, 362 91, 356 84"
        />
      </g>

      <!-- Water reflection outline -->
      <path
        class="reflection-outline"
        d="M82 210 C122 196, 165 224, 208 210 C251 196, 292 224, 338 210"
      />

      <!-- Animated fill reflection -->
      <path
        class="reflection-fill"
        d="M82 210 C122 196, 165 224, 208 210 C251 196, 292 224, 338 210"
      />

      <path
        class="reflection-outline"
        d="M128 230 C158 220, 185 237, 214 229 C246 220, 271 237, 300 229"
      />

      <path
        class="reflection-fill"
        style="animation-delay: .25s"
        d="M128 230 C158 220, 185 237, 214 229 C246 220, 271 237, 300 229"
      />
    </svg>

    <div class="sub-line"></div>

    <p class="loader-text">Curating Your Journey...</p>
  </main>
</body>
</html>
