<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Cafe | Zero Gravity</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }

    /* The Main Website Content */
    .website-content {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #111;
      background-image: radial-gradient(circle at center, #2a0a0a 0%, #111 70%);
    }

    .website-content h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 5vw;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0;
    }

    /* --- PRELOADER STYLES --- */
    .preloader-wrapper {
      position: fixed;
      inset: 0;
      background-color: #030303;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Premium Spotlight Background */
    .spotlight {
      position: absolute;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(255, 60, 0, 0.15) 0%, transparent 60%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    /* 3D Zero-Gravity Stage */
    .food-stage {
      position: relative;
      width: 300px;
      height: 500px;
      z-index: 2;
      perspective: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* PREMIUM 3D CSS PLACEHOLDERS 
      These simulate photorealistic 3D rendering directly in the browser 
    */
    .ingredient {
      position: absolute;
      will-change: transform;
    }

    .top-bun {
      width: 200px;
      height: 80px;
      background: radial-gradient(circle at 50% 20%, #f7b77b, #c36a21);
      border-radius: 100px 100px 20px 20px;
      box-shadow: inset -5px -10px 20px rgba(0,0,0,0.5), 0 20px 20px rgba(0,0,0,0.6);
      top: -20%; z-index: 5;
    }

    .lettuce {
      width: 220px;
      height: 15px;
      background: linear-gradient(90deg, #4CAF50, #2E7D32, #4CAF50);
      border-radius: 10px;
      box-shadow: 0 15px 15px rgba(0,0,0,0.5);
      top: 10%; z-index: 4;
    }

    .cheese {
      width: 210px;
      height: 12px;
      background: #FBC02D;
      border-radius: 5px;
      box-shadow: 0 15px 15px rgba(0,0,0,0.5);
      top: 35%; z-index: 3;
    }

    .patty {
      width: 190px;
      height: 45px;
      background: #3E2723;
      border-radius: 20px;
      box-shadow: inset 0 -5px 10px #211512, 0 15px 15px rgba(0,0,0,0.6);
      top: 55%; z-index: 2;
    }

    .bot-bun {
      width: 200px;
      height: 55px;
      background: radial-gradient(circle at 50% 80%, #f7b77b, #c36a21);
      border-radius: 20px 20px 80px 80px;
      box-shadow: inset -5px 10px 20px rgba(0,0,0,0.3), 0 20px 20px rgba(0,0,0,0.6);
      top: 80%; z-index: 1;
    }

    /* Minimalist Loading UI */
    .loading-ui {
      position: absolute;
      bottom: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .counter {
      font-family: 'Oswald', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      color: #ff471a; 
    }

    .loading-text {
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="preloader-wrapper" id="preloader">
    <div class="spotlight" id="spotlight"></div>
    
    <div class="food-stage" id="burger-stack">
      <div class="ingredient top-bun" id="ing-1"></div>
      <div class="ingredient lettuce" id="ing-2"></div>
      <div class="ingredient cheese" id="ing-3"></div>
      <div class="ingredient patty" id="ing-4"></div>
      <div class="ingredient bot-bun" id="ing-5"></div>
    </div>

    <div class="loading-ui" id="ui">
      <div class="counter" id="counter">0%</div>
      <div class="loading-text">Preparing Order</div>
    </div>
  </div>

  <div class="website-content">
    <h1 id="hero-title">Taste the Extraordinary</h1>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script>
    // 1. Initial State Setup (The 3D Coordinates)
    gsap.set("#ing-1", { y: -150, z: 100, rotationX: 15, rotationY: -10 });
    gsap.set("#ing-2", { y: -50,  z: 50,  rotationX: -10, rotationY: 15 });
    gsap.set("#ing-3", { y: 20,   z: 25,  rotationX: 5,   rotationY: -5 });
    gsap.set("#ing-4", { y: 100,  z: 0,   rotationX: -15, rotationY: 10 });
    gsap.set("#ing-5", { y: 200,  z: -50, rotationX: 10,  rotationY: -15 });

    // 2. The Slow-Motion Float 
    const floatAnim = gsap.to(".ingredient", {
      y: "+=20",
      rotationX: "+=5",
      rotationY: "+=5",
      duration: 3,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut",
      stagger: { amount: 1.5, from: "center" }
    });

    const tl = gsap.timeline({
      onComplete: () => {
        document.getElementById('preloader').style.display = 'none';
        document.body.style.overflow = 'auto';
      }
    });

    // 3. Loading Counter Logic
    let counterObj = { value: 0 };
    let counterElement = document.getElementById("counter");

    tl.to(counterObj, {
      value: 100,
      duration: 3.5, 
      ease: "power1.inOut",
      onUpdate: () => {
        counterElement.innerText = Math.round(counterObj.value) + "%";
      }
    });

    // 4. The Assembly (The Snap)
    tl.to("#ui", { opacity: 0, duration: 0.3 }, "-=0.3")
      .add(() => floatAnim.kill(), "<");

    tl.to(".ingredient", {
      y: 0,
      z: 0,
      x: 0,
      top: "25%", 
      rotationX: 0,
      rotationY: 0,
      rotationZ: 0,
      duration: 0.8,
      ease: "expo.inOut" 
    }, "+=0.1");

    // 5. The Cinematic Reveal
    tl.to("#burger-stack", {
      scale: 4,
      opacity: 0,
      duration: 1,
      ease: "power2.in"
    }, "+=0.4")
    
    .to("#spotlight", {
      scale: 3,
      opacity: 0,
      duration: 0.8,
      ease: "power2.in"
    }, "<")

    .to(".preloader-wrapper", {
      opacity: 0,
      duration: 0.8,
      ease: "power2.inOut"
    }, "-=0.4")

    .to("#hero-title", {
      opacity: 1,
      y: -30,
      duration: 1.2,
      ease: "power3.out"
    }, "-=0.5");
  </script>
</body>
</html>
