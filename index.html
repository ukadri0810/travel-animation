<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kashmir Shikara Premium Loader</title>

  <style>
    :root {
      --bg-1: #07101f;
      --bg-2: #101c2d;
      --gold: #d8b56d;
      --gold-soft: rgba(216, 181, 109, 0.32);
      --gold-faint: rgba(216, 181, 109, 0.12);
      --white-soft: rgba(255, 255, 255, 0.66);
      --mountain: rgba(255, 255, 255, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 40%, rgba(216, 181, 109, 0.10), transparent 22%),
        radial-gradient(circle at 50% 78%, rgba(44, 114, 146, 0.14), transparent 24%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1) 72%);
      font-family: Inter, Montserrat, system-ui, sans-serif;
      color: #fff;
    }

    .loader {
      width: min(94vw, 720px);
      text-align: center;
      position: relative;
      isolation: isolate;
    }

    .loader::before {
      content: "";
      position: absolute;
      width: 520px;
      height: 720px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -48%);
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,.07), transparent),
        radial-gradient(ellipse at 50% 38%, rgba(216,181,109,.16), transparent 28%);
      filter: blur(18px);
      opacity: .8;
      z-index: -1;
      animation: ambientMove 7s ease-in-out infinite alternate;
    }

    svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .draw {
      fill: none;
      stroke: var(--gold);
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px rgba(216,181,109,.38));
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 2.8s ease forwards;
    }

    .draw.delay-1 { animation-delay: .18s; }
    .draw.delay-2 { animation-delay: .35s; }
    .draw.delay-3 { animation-delay: .55s; }
    .draw.delay-4 { animation-delay: .8s; }

    .mountain-line {
      fill: none;
      stroke: var(--mountain);
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: drawMountain 3.2s ease forwards;
      animation-delay: 4.8s;
    }

    .sun {
      opacity: 0;
      transform-origin: center;
      animation: sunRise 1.6s ease forwards;
      animation-delay: 5.3s;
      filter: drop-shadow(0 0 26px rgba(216,181,109,.75));
    }

    .boat {
      transform-origin: center;
      animation: boatFloat 3.8s ease-in-out infinite;
      animation-delay: 2.7s;
    }

    .reflection {
      opacity: 0;
      transform-origin: center;
      animation: reflectionAppear 1.5s ease forwards, reflectionFloat 3.8s ease-in-out infinite;
      animation-delay: 3.1s, 3.2s;
    }

    .reflection path {
      fill: none;
      stroke: rgba(216, 181, 109, 0.55);
      stroke-width: 1.45;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 12px rgba(216,181,109,.28));
    }

    .ripple {
      fill: none;
      stroke: rgba(216, 181, 109, 0.34);
      stroke-width: 1.4;
      transform-origin: center;
      opacity: 0;
      animation: ripplePulse 3.2s ease-out infinite;
      animation-delay: 2.6s;
    }

    .ripple.r2 {
      animation-delay: 3.15s;
      stroke: rgba(143, 188, 204, 0.24);
    }

    .ripple.r3 {
      animation-delay: 3.7s;
      stroke: rgba(216, 181, 109, 0.20);
    }

    .water-glow {
      opacity: 0;
      animation: waterGlow 1.6s ease forwards;
      animation-delay: 3s;
    }

    .text {
      margin-top: -14px;
      color: rgba(255, 244, 221, 0.92);
      font-size: clamp(.9rem, 2.2vw, 1.08rem);
      letter-spacing: .03em;
      font-weight: 400;
      text-shadow: 0 0 16px rgba(216,181,109,.28);
      opacity: 0;
      transform: translateY(10px);
      animation: textReveal 1s ease forwards, textPulse 2.8s ease-in-out infinite;
      animation-delay: 2.4s, 3.5s;
    }

    .spark {
      fill: rgba(255,255,255,.78);
      opacity: 0;
      transform-origin: center;
      animation: sparkle 2.8s ease-in-out infinite;
      animation-delay: 2.8s;
    }

    .spark.right {
      animation-delay: 3.6s;
    }

    @keyframes drawLine {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes drawMountain {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes boatFloat {
      0%, 100% {
        transform: translateY(0) rotate(-0.35deg);
      }
      50% {
        transform: translateY(-8px) rotate(0.35deg);
      }
    }

    @keyframes reflectionAppear {
      from {
        opacity: 0;
        transform: translateY(-8px) scaleY(.7);
      }
      to {
        opacity: .78;
        transform: translateY(0) scaleY(1);
      }
    }

    @keyframes reflectionFloat {
      0%, 100% {
        transform: translateY(0) scaleY(1);
      }
      50% {
        transform: translateY(6px) scaleY(.94);
      }
    }

    @keyframes ripplePulse {
      0% {
        opacity: 0;
        transform: scale(.62);
      }
      22% {
        opacity: .86;
      }
      100% {
        opacity: 0;
        transform: scale(1.45);
      }
    }

    @keyframes waterGlow {
      to {
        opacity: 1;
      }
    }

    @keyframes sunRise {
      from {
        opacity: 0;
        transform: translateY(22px) scale(.78);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes textReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes textPulse {
      0%, 100% {
        opacity: .62;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes sparkle {
      0%, 100% {
        opacity: .18;
        transform: scale(.8) rotate(0deg);
      }
      50% {
        opacity: .9;
        transform: scale(1.08) rotate(45deg);
      }
    }

    @keyframes ambientMove {
      from {
        transform: translate(-52%, -49%) rotate(-2deg);
      }
      to {
        transform: translate(-48%, -47%) rotate(2deg);
      }
    }

    @media (max-width: 520px) {
      .loader {
        width: 96vw;
      }

      .text {
        margin-top: -4px;
      }

      .draw {
        stroke-width: 2.3;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>

<body>
  <main class="loader" aria-label="Kashmir Shikara loading animation">
    <svg viewBox="0 0 720 520" role="img">
      <defs>
        <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff4c8"/>
          <stop offset="55%" stop-color="#d8b56d"/>
          <stop offset="100%" stop-color="rgba(216,181,109,0)"/>
        </radialGradient>

        <radialGradient id="waterGradient" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(216,181,109,.22)" />
          <stop offset="55%" stop-color="rgba(77,136,160,.14)" />
          <stop offset="100%" stop-color="rgba(77,136,160,0)" />
        </radialGradient>
      </defs>

      <!-- Background Kashmir mountains reveal later -->
      <path class="mountain-line"
        d="M92 278 C130 228 163 210 198 245 C225 184 263 147 310 224 C340 169 377 114 430 218 C464 172 499 148 548 226 C584 198 620 214 650 250" />
      <path class="mountain-line"
        d="M38 302 C100 260 142 268 190 286 C250 226 307 240 356 282 C417 218 490 246 540 280 C590 254 636 270 690 300" />

      <!-- Sun behind mountains -->
      <circle class="sun" cx="462" cy="236" r="32" fill="url(#sunGradient)" />

      <!-- Water glow -->
      <ellipse class="water-glow" cx="360" cy="365" rx="212" ry="45" fill="url(#waterGradient)" />

      <!-- Ripple rings -->
      <ellipse class="ripple r1" cx="360" cy="355" rx="128" ry="30" />
      <ellipse class="ripple r2" cx="360" cy="355" rx="166" ry="39" />
      <ellipse class="ripple r3" cx="360" cy="355" rx="205" ry="48" />

      <!-- Shikara reflection -->
      <g class="reflection">
        <path d="M252 362 C276 386 444 386 468 362" />
        <path d="M278 376 C308 397 412 397 442 376" />
        <path d="M316 382 L316 432" />
        <path d="M404 382 L404 432" />
        <path d="M288 422 C324 446 398 446 432 422" />
        <path d="M312 432 C340 456 382 456 410 432" />
      </g>

      <!-- Main Shikara -->
      <g class="boat">
        <!-- Curved long hull -->
        <path class="draw delay-1"
          d="M214 304 C260 338 462 338 506 304" />
        <path class="draw delay-1"
          d="M214 304 C282 320 438 320 506 304" />

        <!-- Raised Kashmiri bow and stern -->
        <path class="draw delay-2"
          d="M214 304 C190 287 183 256 194 230 C211 263 233 288 268 299" />
        <path class="draw delay-2"
          d="M506 304 C532 287 539 254 527 226 C509 262 486 288 450 299" />

        <!-- lower slim hull -->
        <path class="draw delay-3"
          d="M256 324 C302 348 420 348 464 324" />

        <!-- Canopy roof -->
        <path class="draw"
          d="M292 221 C308 176 414 176 430 221" />
        <path class="draw delay-1"
          d="M304 220 C322 195 400 195 418 220" />

        <!-- decorative roof cap -->
        <path class="draw delay-2"
          d="M296 213 L430 213" />
        <path class="draw delay-3"
          d="M316 195 L408 195" />

        <!-- supports -->
        <path class="draw delay-2" d="M304 222 L304 292" />
        <path class="draw delay-2" d="M418 222 L418 292" />
        <path class="draw delay-3" d="M337 214 L337 288" />
        <path class="draw delay-3" d="M386 214 L386 288" />

        <!-- seating/cabin -->
        <path class="draw delay-3"
          d="M280 292 C310 274 414 274 444 292" />
        <path class="draw delay-4"
          d="M300 294 L424 294" />

        <!-- small curtains/pattern -->
        <path class="draw delay-4"
          d="M320 238 C332 247 344 247 356 238 C368 247 380 247 392 238 C402 246 412 245 420 238" />
        <path class="draw delay-4"
          d="M319 260 C333 250 345 270 360 260 C374 250 388 270 403 260" />

        <!-- paddle -->
        <path class="draw delay-4"
          d="M434 279 L536 214" />
        <path class="draw delay-4"
          d="M536 214 C552 203 568 207 578 220 C562 226 548 224 536 214" />
      </g>

      <!-- Text side sparkles like reference -->
      <path class="spark left" d="M122 388 L130 407 L138 388 L130 369 Z" />
      <path class="spark right" d="M604 388 L612 407 L620 388 L612 369 Z" />
    </svg>

    <p class="text">Curating Your Kashmiri Journey</p>
  </main>
</body>
</html>
