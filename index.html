<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kashmir 2025 | Premium Experience</title>
  <style>
    /* Reset and Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #ffffff; /* The "website" underneath */ }

    /* Preloader CSS */
    .preloader-wrapper {
      position: fixed;
      inset: 0;
      background-color: #0b1115;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .chinar-leaf {
      width: 80px;
      height: 80px;
    }

    .leaf-path {
      fill: transparent;
      stroke: #c8a97e;
      stroke-width: 2px;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
    }

    .preloader-text {
      color: #ffffff;
      font-family: 'Georgia', serif; /* Standard serif for testing */
      font-size: 1.2rem;
      letter-spacing: 0.2em;
      display: flex;
    }

    .preloader-text .char {
      opacity: 0;
      transform: translateY(10px);
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="preloader-wrapper">
    <div class="preloader-content">
      <svg class="chinar-leaf" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path class="leaf-path" d="M50,10 C60,30 80,40 90,60 C80,70 60,70 50,90 C40,70 20,70 10,60 C20,40 40,30 50,10 Z" />
      </svg>
      
      <div class="preloader-text">
        <span class="char">K</span><span class="char">a</span><span class="char">s</span><span class="char">h</span><span class="char">m</span><span class="char">i</span><span class="char">r</span>
        <span class="word-space">&nbsp;</span>
        <span class="char">2</span><span class="char">0</span><span class="char">2</span><span class="char">5</span>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script>
    document.body.style.overflow = "hidden";

    const tl = gsap.timeline({
      onComplete: () => {
        document.body.style.overflow = "auto";
        // To prevent blocking clicks after it fades out:
        document.querySelector('.preloader-wrapper').style.pointerEvents = 'none';
      }
    });

    // Draw the leaf
    tl.to(".leaf-path", { strokeDashoffset: 0, duration: 1.5, ease: "power2.inOut" })
      .to(".leaf-path", { fill: "rgba(200, 169, 126, 0.4)", duration: 0.5, ease: "power1.out" }, "-=0.5")

    // Stagger text
      .to(".preloader-text .char", { opacity: 1, y: 0, stagger: 0.05, duration: 0.8, ease: "power3.out" }, "-=0.8")
      .to(".preloader-text", { letterSpacing: "0.05em", duration: 1.5, ease: "power2.out" }, "-=1.2")

    // The Unveiling
      .to(".preloader-content", { y: -50, opacity: 0, duration: 0.6, ease: "power2.in" }, "+=0.3")
      .to(".preloader-wrapper", { yPercent: -100, duration: 1, ease: "expo.inOut", borderRadius: "0 0 50% 50%" }, "-=0.2");
  </script>
</body>
</html>
