<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Cinematic Loader</title>
  <style>
    /* High-fashion, editorial Serif */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
    /* Clean sans for metadata */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #050404; /* Not pure black, a very deep warm espresso */
      overflow: hidden;
    }

    /* =========================================
       1. THE ATMOSPHERE (BOKEH & LIGHT)
       ========================================= */
    #cinematic-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #050404;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      /* The final exit transition */
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1),
                  background-color 1.5s ease;
    }

    /* An invisible container to hold our out-of-focus lights */
    .bokeh-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Screen blend mode makes the overlapping lights blow out realistically */
      mix-blend-mode: screen; 
      transition: opacity 2s ease;
      z-index: 1;
    }

    /* The actual light sources */
    .light-orb {
      position: absolute;
      border-radius: 50%;
      /* Extreme blur simulates a completely out-of-focus background */
      filter: blur(60px); 
      opacity: 0.6;
    }

    /* Warm champagne light */
    .orb-1 {
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.4) 0%, transparent 70%);
      top: -10%;
      left: -10%;
      animation: drift 10s infinite cubic-bezier(0.4, 0, 0.2, 1) alternate;
    }

    /* Soft blush/peach light */
    .orb-2 {
      width: 35vw;
      height: 35vw;
      background: radial-gradient(circle, rgba(255, 203, 179, 0.3) 0%, transparent 70%);
      bottom: 10%;
      right: -5%;
      animation: drift 12s infinite cubic-bezier(0.25, 1, 0.5, 1) alternate-reverse;
    }

    /* Crisp white highlight */
    .orb-3 {
      width: 25vw;
      height: 25vw;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
      top: 40%;
      left: 40%;
      animation: drift 8s infinite ease-in-out alternate;
    }

    /* Subtle Film Grain Overlay */
    .film-grain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      z-index: 2;
      pointer-events: none;
    }

    /* =========================================
       2. TYPOGRAPHY & THE FOCUS PULL
       ========================================= */
    .brand-container {
      position: relative;
      z-index: 3;
      text-align: center;
      /* Starts completely blurred out and invisible */
      opacity: 0;
      filter: blur(15px);
      transform: scale(1.05);
      /* The "Focus Pull" transition */
      transition: opacity 2s cubic-bezier(0.21, 1.04, 0.36, 1),
                  filter 2s cubic-bezier(0.21, 1.04, 0.36, 1),
                  transform 2s cubic-bezier(0.21, 1.04, 0.36, 1);
    }

    /* JavaScript will add this class to simulate the lens finding focus */
    .brand-container.in-focus {
      opacity: 1;
      filter: blur(0px);
      transform: scale(1);
    }

    .studio-name {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    /* The italicized serif instantly elevates the luxury feel */
    .studio-name i {
      font-weight: 400;
      color: #E6CBA8; /* Champagne accent */
    }

    .metadata {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    /* =========================================
       3. EXIT CHOREOGRAPHY
       ========================================= */
    .loader-exit {
      opacity: 0;
      pointer-events: none;
    }

    /* Darken the bokeh slightly before revealing the site, 
       ensuring the photos pop when they appear */
    .loader-exit .bokeh-container {
      opacity: 0;
    }

    .loader-exit .brand-container {
      opacity: 0;
      filter: blur(10px); /* Defocus again as it exits */
      transform: scale(0.95);
      transition: all 1s ease-in;
    }

    /* =========================================
       KEYFRAMES
       ========================================= */
    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8vw, -5vw) scale(1.1); }
    }

    /* Dummy Homepage for testing */
    #main-content {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: 'Inter', sans-serif;
      opacity: 0;
      transition: opacity 1.5s ease 0.5s;
    }
    .content-enter { opacity: 1 !important; }

  </style>
</head>
<body>

  <div id="cinematic-loader">
    <div class="film-grain"></div>
    
    <!-- The out-of-focus background lights -->
    <div class="bokeh-container" id="bokeh">
      <div class="light-orb orb-1"></div>
      <div class="light-orb orb-2"></div>
      <div class="light-orb orb-3"></div>
    </div>

    <!-- The Typography -->
    <div class="brand-container" id="brand">
      <h1 class="studio-name">Studio <i>Cinématique</i></h1>
      <div class="metadata">Capturing Timelessness</div>
    </div>
  </div>

  <main id="main-content">
    <h2 style="font-weight: 300; letter-spacing: 0.1em;">Portfolio Architecture Revealed</h2>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const brand = document.getElementById('brand');
      const loader = document.getElementById('cinematic-loader');
      const content = document.getElementById('main-content');

      // 1. Initiate the "Rack Focus" shortly after the page loads.
      // This gives the user 300ms to appreciate the abstract bokeh before the text sharpens.
      setTimeout(() => {
        brand.classList.add('in-focus');
      }, 300);

      // 2. Hold the focus for the user to read, then trigger the exit.
      // In a real build, this timeout is replaced by your window.onload or image preloader promise.
      setTimeout(() => {
        
        // Defocus and fade the loader
        loader.classList.add('loader-exit');
        
        // Crossfade into the main portfolio
        content.classList.add('content-enter');

        // Remove the loader from the DOM to free memory
        setTimeout(() => {
          loader.remove();
        }, 1500);

      }, 3500);
    });
  </script>

</body>
</html>
