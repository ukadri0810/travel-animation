<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arc Dental — Premium Loader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="loader" id="loader" aria-live="polite" role="status">
    <div class="loader__ceramic"></div>
    <div class="loader__grain"></div>
    <div class="loader__light"></div>

    <div class="loader__center">
      <div class="emboss-wrap">
        <svg class="arc-mark" viewBox="0 0 180 82" aria-hidden="true">
          <path class="arc-line" d="M20 57 C47 19, 132 19, 160 57" />
          <path class="smile-line" d="M55 55 C72 68, 108 68, 125 55" />
        </svg>
        <div class="loader__brand">Arc Dental</div>
      </div>
      <p class="loader__caption">Thoughtfully crafted dentistry</p>
    </div>

    <div class="glass-reveal">
      <div class="glass-reveal__inner"></div>
    </div>
  </div>

  <main class="page" id="page">
    <header class="nav">
      <div class="nav__brand">
        <span class="nav__dot"></span>
        <span>Arc Dental</span>
      </div>
      <nav>
        <a href="#">Care</a>
        <a href="#">Studio</a>
        <a href="#">Book Visit</a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero__copy">
        <span class="eyebrow">Restorative & Cosmetic Dentistry</span>
        <h1>A calmer way<br><em>to smile.</em></h1>
        <p>Modern dental care shaped around comfort, precision, and quiet confidence.</p>
        <button>Book a consultation</button>
      </div>
      <div class="hero__visual">
        <div class="photo-card photo-card--main"></div>
        <div class="photo-card photo-card--small"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
