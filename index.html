<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Kashmir Shikara Loader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="loader-screen" id="loaderScreen">
    <section class="loader-card" aria-label="Kashmir shikara loading bar">
      <div class="bar-stage" id="barStage">

        <div class="progress-track" id="progressTrack">
          <div class="lake-depth"></div>

          <div class="water-fill" id="waterFill">
            <svg class="wave wave-back" viewBox="0 0 1100 80" preserveAspectRatio="none">
              <path d="M0 44 C70 20, 140 68, 210 44 S350 20, 420 44 S560 68, 630 44 S770 20, 840 44 S980 68, 1050 44 S1190 20, 1260 44 L1260 80 L0 80 Z"/>
            </svg>

            <svg class="wave wave-front" viewBox="0 0 1100 80" preserveAspectRatio="none">
              <path d="M0 39 C62 24, 124 54, 186 39 S310 24, 372 39 S496 54, 558 39 S682 24, 744 39 S868 54, 930 39 S1054 24, 1116 39 L1116 80 L0 80 Z"/>
            </svg>

            <div class="liquid-edge" id="liquidEdge"></div>
            <div class="water-texture"></div>
          </div>

          <div class="track-shine" id="trackShine"></div>
          <div class="wake-layer" id="wakeLayer"></div>
          <div class="paddle-ripple" id="paddleRipple"></div>
        </div>

        <div class="boat-wrap" id="boatWrap">
          <img src="assets/clean-shikara-reflection.png" alt="" class="shikara-reflection" aria-hidden="true" draggable="false" />
          <img src="assets/clean-shikara.png" alt="Kashmir shikara with rower" class="shikara-img" draggable="false" />
          <div class="paddle-splash" id="paddleSplash"></div>
        </div>
      </div>

      <p class="loader-text">CURATING YOUR JOURNEY...</p>
    </section>
  </main>

  <section class="page-preview">
    <h1>Kashmir Awaits</h1>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
