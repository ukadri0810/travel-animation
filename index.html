<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAVE | Premium Fast Food</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background-color: #f4f4f0; 
            font-family: 'Montserrat', sans-serif; 
            color: #111;
        }

        /* --- AGENCY PRELOADER (CANVAS ENGINE) --- */
        #preloader-container {
            position: fixed;
            inset: 0;
            background-color: #050505;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #1a0500 0%, #050505 80%);
        }

        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .loading-ui {
            position: absolute;
            bottom: 40px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .counter {
            color: #ff3b00;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 59, 0, 0.4);
        }

        .loading-text {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* --- MAIN CAFE WEBSITE (HERO SECTION) --- */
        .main-wrapper {
            opacity: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 30px 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #111;
        }

        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; text-transform: uppercase; }
        .nav-links { display: flex; gap: 30px; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
        .nav-links a { color: #111; text-decoration: none; }
        .order-btn { background-color: #ff3b00; color: white !important; padding: 10px 20px; border-radius: 50px; }

        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5vw;
            position: relative;
            overflow: hidden;
        }

        .hero-tagline {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff3b00;
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: 11vw;
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -4px;
            text-transform: uppercase;
            max-width: 800px;
        }

        .marquee-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            overflow: hidden;
            background-color: #111;
            color: #f4f4f0;
            padding: 15px 0;
            transform: rotate(-2deg) scale(1.05); 
            z-index: -1;
        }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .marquee-item { padding: 0 2vw; display: flex; align-items: center; }
        .marquee-item::after { content: '•'; color: #ff3b00; margin-left: 4vw; }
    </style>
</head>
<body>

    <div id="preloader-container">
        <canvas id="particle-canvas"></canvas>
        <div class="loading-ui" id="ui">
            <div class="counter" id="counter">0%</div>
            <div class="loading-text">Igniting the Grill</div>
        </div>
    </div>

    <div class="main-wrapper" id="site-content">
        <nav>
            <div class="logo">CRAVE.</div>
            <div class="nav-links">
                <a href="#">Menu</a>
                <a href="#">Locations</a>
                <a href="#" class="order-btn">Order Now</a>
            </div>
        </nav>

        <div class="hero">
            <div class="hero-tagline" id="tagline">No Compromise. Just Flavor.</div>
            <h1 class="hero-title" id="main-title">Smash.<br>Sizzle.<br>Serve.</h1>

            <div class="marquee-container" id="marquee">
                <div class="marquee-content" id="marquee-inner">
                    <span class="marquee-item">100% Wagyu Beef</span>
                    <span class="marquee-item">Hand-Cut Fries</span>
                    <span class="marquee-item">Artisan Buns</span>
                    <span class="marquee-item">Secret Sauce</span>
                    <span class="marquee-item">100% Wagyu Beef</span>
                    <span class="marquee-item">Hand-Cut Fries</span>
                    <span class="marquee-item">Artisan Buns</span>
                    <span class="marquee-item">Secret Sauce</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Global boolean to trigger the physics explosion
        let isExploding = false;

        /**
         * 1. TIMELINE & WEBSITE REVEAL 
         * We run this immediately so the counter never gets stuck, regardless of canvas errors.
         */
        const tl = gsap.timeline({
            onComplete: () => {
                document.getElementById('preloader-container').style.display = 'none';
                document.body.style.overflow = 'auto'; 
            }
        });

        let loadState = { value: 0 };
        let counterEl = document.getElementById("counter");

        tl.to(loadState, {
            value: 100,
            duration: 3.5, 
            ease: "power1.inOut",
            onUpdate: () => {
                counterEl.innerText = Math.round(loadState.value) + "%";
            }
        })
        .add(() => { isExploding = true; })
        .to("#ui", { opacity: 0, duration: 0.2 }, "<")
        .to("#preloader-container", { backgroundColor: "transparent", backgroundImage: "none", duration: 1.2, ease: "power2.inOut" }, "+=0.2")
        .set("#site-content", { opacity: 1 }, "-=1.2")
        .from("nav", { y: -30, opacity: 0, duration: 0.8, ease: "power2.out" }, "-=0.5")
        .from("#tagline", { y: 20, opacity: 0, duration: 0.8, ease: "power2.out" }, "-=0.6")
        .from("#main-title", { y: 40, opacity: 0, duration: 1, ease: "power3.out" }, "-=0.7")
        .from("#marquee", { y: 100, rotation: 0, opacity: 0, duration: 1, ease: "back.out(1.5)" }, "-=0.8");

        gsap.to("#marquee-inner", { xPercent: -50, repeat: -1, duration: 15, ease: "none" });

        /**
         * 2. PARTICLE PHYSICS ENGINE
         * We wait for the web fonts to load, then safely wrap the Canvas in a try/catch.
         */
        document.fonts.ready.then(() => {
            try {
                const canvas = document.getElementById('particle-canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                let particleArray = [];
                const mouse = { x: null, y: null, radius: 120 };

                window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
                window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
                window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

                function drawTextToCanvas() {
                    ctx.fillStyle = 'white';
                    let fontSize = canvas.width < 768 ? 70 : 150; 
                    ctx.font = `900 ${fontSize}px Montserrat`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('CRAVE', canvas.width / 2, canvas.height / 2);
                }

                class Particle {
                    constructor(x, y) {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.baseX = x;
                        this.baseY = y;
                        this.density = (Math.random() * 30) + 1;
                        this.size = Math.random() * 2.5 + 1;
                        const colors = ['#ff3b00', '#ff9900', '#ffc107', '#ff6a00'];
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                        
                        this.explodeVelX = (Math.random() - 0.5) * 50;
                        this.explodeVelY = (Math.random() - 0.5) * 50;
                    }

                    draw() {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.closePath();
                        ctx.fill();
                    }

                    update() {
                        if (isExploding) {
                            this.x += this.explodeVelX;
                            this.y += this.explodeVelY;
                            this.draw();
                            return;
                        }

                        let dx = mouse.x - this.x;
                        let dy = mouse.y - this.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        
                        let forceDirectionX = dx / distance;
                        let forceDirectionY = dy / distance;
                        let force = (mouse.radius - distance) / mouse.radius;
                        
                        if (distance < mouse.radius) {
                            this.x -= forceDirectionX * force * this.density;
                            this.y -= forceDirectionY * force * this.density;
                        } else {
                            if (this.x !== this.baseX) { this.x -= (this.x - this.baseX) / 10; }
                            if (this.y !== this.baseY) { this.y -= (this.y - this.baseY) / 10; }
                        }
                        this.draw();
                    }
                }

                function initCanvas() {
                    particleArray = [];
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawTextToCanvas();
                    
                    const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    for (let y = 0; y < textCoordinates.height; y += 4) {
                        for (let x = 0; x < textCoordinates.width; x += 4) {
                            if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                                particleArray.push(new Particle(x, y));
                            }
                        }
                    }
                }

                function animateCanvas() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < particleArray.length; i++) { particleArray[i].update(); }
                    requestAnimationFrame(animateCanvas);
                }

                initCanvas();
                animateCanvas();

                window.addEventListener('resize', () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    initCanvas();
                });

            } catch (error) {
                console.warn("Canvas disabled due to local file security restrictions. The website loading sequence will still run normally.");
            }
        });
    </script>
</body>
</html>
